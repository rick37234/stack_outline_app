{% extends "base.html" %}
{% block title %}Edit Team{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Edit Team</h1>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" name="name" class="form-control" value="{{ team.name }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Location</label>
    <input type="text" name="location" class="form-control" value="{{ team.location }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Conference</label>
    <input type="text" name="conference" class="form-control" value="{{ team.conference }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Coach</label>
    <input type="text" name="coach" class="form-control" value="{{ team.coach }}" required>
  </div>
  <div class="row">
    <div class="col mb-3">
      <label class="form-label">Wins</label>
      <input type="number" name="wins" class="form-control" value="{{ team.wins }}" min="0" required>
    </div>
    <div class="col mb-3">
      <label class="form-label">Losses</label>
      <input type="number" name="losses" class="form-control" value="{{ team.losses }}" min="0" required>
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('main.teams') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
