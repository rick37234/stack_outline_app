{% extends "base.html" %}
{% block title %}Add Player{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Add Player</h1>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" name="name" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Team</label>
    <select name="team_id" class="form-select" required>
      <option value="">-- Select Team --</option>
      {% for team in teams %}
        <option value="{{ team.team_id }}">{{ team.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Position</label>
    <input type="text" name="position" class="form-control" placeholder="e.g. PG, SG" required>
  </div>
  <div class="row">
    <div class="col mb-3">
      <label class="form-label">Height (inches)</label>
      <input type="number" name="height_in" class="form-control" min="1" required>
    </div>
    <div class="col mb-3">
      <label class="form-label">Weight (lbs)</label>
      <input type="number" name="weight_lbs" class="form-control" min="1" required>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Salary ($)</label>
    <input type="number" name="salary" class="form-control" min="0" required>
  </div>
  <button type="submit" class="btn btn-primary">Add Player</button>
  <a href="{{ url_for('main.players') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
